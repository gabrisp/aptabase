# Production / self-hosted deployment (e.g. Coolify)
#
# Required environment variables (set them in Coolify or in a .env file):
#   BASE_URL             e.g. https://analytics.yourdomain.com
#   AUTH_SECRET          long random string, e.g. `openssl rand -base64 48`
#   POSTGRES_PASSWORD    password for the bundled PostgreSQL
#   CLICKHOUSE_PASSWORD  password for the bundled ClickHouse
#
# Optional (emails for login codes):
#   SMTP_HOST, SMTP_PORT, SMTP_USERNAME, SMTP_PASSWORD, SMTP_FROM_ADDRESS

services:
  aptabase:
    # Builds straight from the GitHub repo so this compose also works when
    # pasted standalone (e.g. Coolify "Docker Compose" service without a git source)
    build:
      context: "https://github.com/gabrisp/aptabase.git#main"
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      ASPNETCORE_HTTP_PORTS: 8080
      BASE_URL: ${BASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      DATABASE_URL: Server=db;Port=5432;User Id=aptabase;Password=${POSTGRES_PASSWORD};Database=aptabase
      CLICKHOUSE_URL: Host=events_db;Port=8123;Username=aptabase;Password=${CLICKHOUSE_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_ADDRESS: ${SMTP_FROM_ADDRESS:-}
    depends_on:
      db:
        condition: service_healthy
      events_db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: aptabase
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: aptabase
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aptabase"]
      interval: 10s
      timeout: 5s
      retries: 5

  events_db:
    image: clickhouse/clickhouse-server:23.8.4.69
    restart: unless-stopped
    volumes:
      - events-db-data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_USER: aptabase
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

volumes:
  db-data:
    driver: local
  events-db-data:
    driver: local
